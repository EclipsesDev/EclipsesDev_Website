<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EclipsesDev - Video Cloud</title>
    
    <link rel="icon" href="/assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/projects/video-cloud/vs-assets/vs.css">
    <link rel="stylesheet" href="/projects/video-cloud/style.css">
</head>
<body>

    <nav class="nav-bar">
        <a href="/projects/project-panel"><button>Back</button></a>
        <a href="/"><button>Home</button></a>
        <a href="/projects/video-cloud/upload"><button>Upload</button></a>
        <button id="logout-btn">Logout</button>
    </nav>

    <div class="container">
        <h1>Video Cloud</h1>
        <p id="session-info" class="session-info"></p>
        <div id="video-grid"></div>
    </div>

    <div class="vc-lightbox" id="vc-lightbox">
        <div class="vc-video-container">
            <video id="vc-player" playsinline webkit-playsinline></video>

            <div id="vc-overlay">
                <button id="vc-play-btn" type="button" aria-label="Play or pause video">
                    <img id="vc-play-icon" class="vc-icon vc-play-icon" src="/assets/img/Play.png" alt="Play">
                </button>
            </div>

            <div id="vc-controls">
                <div id="vc-progress-container">
                    <div id="vc-progress-bar"></div>
                </div>
                <button id="vc-mute-btn" type="button" aria-label="Toggle mute">
                    <img id="vc-mute-icon" class="vc-icon vc-control-icon" src="/assets/svg/unmute.svg" alt="Unmuted">
                </button>
                <span id="vc-time">0:00 / 0:00</span>
                <button id="vc-fullscreen-btn" type="button" aria-label="Toggle fullscreen">
                    <img id="vc-fullscreen-icon" class="vc-icon vc-control-icon" src="/assets/svg/maximize.svg" alt="Enter fullscreen">
                </button>
            </div>
        </div>

        <button id="vc-close-btn" type="button" aria-label="Close video">
            <img id="vc-close-icon" class="vc-icon vc-close-icon" src="/assets/svg/close.svg" alt="Close">
        </button>
    </div>

    <script src="/projects/video-cloud/vs-assets/vc.js"></script>
    <script src="/projects/video-cloud/auth.js"></script>
    <script src="/projects/video-cloud/script.js"></script>
</body>
</html>
