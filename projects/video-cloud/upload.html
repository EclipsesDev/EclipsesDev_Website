<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EclipsesDev - Video Cloud</title>

  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/projects/video-cloud/style.css">
</head>
<body>
  <h1 class="upload-title">Upload Video</h1>

  <form id="upload-form" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Video Title" required>
    <input type="text" name="description" placeholder="Description">
    <input type="file" name="file" accept="video/mp4" required>
    <button type="submit">Upload Video</button>
  </form>

  <script src="/projects/video-cloud/auth.js"></script>

  <input type="file" id="video-file" accept="video/mp4">
  
  <button id="upload-btn">Upload</button>

  <progress id="progress-bar" value="0" max="100" style="display:none;"></progress>

  <script>
  document.getElementById("upload-btn").addEventListener("click", async () => {
    const file = document.getElementById("video-file").files[0];
    if (!file) return alert("Select a video!");

    const res = await fetch("/video-api/upload-url", { method: "POST", credentials: "include" });
    const { uploadUrl, filename } = await res.json();

    const progressBar = document.getElementById("progress-bar");
    progressBar.style.display = "block";

    const xhr = new XMLHttpRequest();
    xhr.open("PUT", uploadUrl);
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        progressBar.value = Math.round((e.loaded / e.total) * 100);
      }
    };
    xhr.onload = () => {
      progressBar.value = 100;
      alert("Upload complete!");
      progressBar.style.display = "none";

      fetch("/video-api/save-video", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title: file.name,
          description: "Uploaded via Cloudflare Worker",
          filename
        }),
        credentials: "include"
      });
    };
    xhr.onerror = () => {
      alert("Upload failed!");
      progressBar.style.display = "none";
    };
    xhr.send(file);
  });
  </script>
</body>
</html>
